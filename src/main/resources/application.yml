spring:
  application:
    name: servicio-precios
  datasource:
    url: jdbc:h2:mem:preciosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

server:
  port: 8080

logging:
  level:
    com.comercio.precios.configuracion.registro: INFO

# OpenAPI 3 + Swagger UI (springdoc-openapi). En producción conviene desactivar o proteger (perfil prod).
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
